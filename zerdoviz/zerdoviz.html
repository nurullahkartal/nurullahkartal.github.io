<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZER DÖVİZ | BORSA TERMİNALİ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --zer-blue: #0000FF; --harem-gold: #c5a059; --bg: #f8fafc; --gko-red: #d32f2f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg); color: #1a1a1a; 
            font-family: 'Inter', sans-serif; height: 100vh; 
            overflow: hidden; display: flex; flex-direction: column; 
            padding: 0.5vh 0.5vw;
        }

        /* 👑 DEV LOGO */
        .header-logo {
            height: 16vh; background: #fff; border-radius: 12px; 
            border-bottom: 1vh solid var(--zer-blue);
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 0.8vh; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header-logo img { height: 90%; width: auto; object-fit: contain; }

        /* 📊 DÖVİZ PANELİ */
        .currency-panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1vw; margin-bottom: 0.8vh; height: 9vh; }
        .cur-box { background: #fff; border-radius: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; border: 1.5px solid #e2e8f0; }
        .cur-n { font-size: 1.4vh; font-weight: 900; color: var(--harem-gold); text-transform: uppercase; }
        .cur-v { font-size: 2.8vh; font-weight: 800; font-family: monospace; }

        /* 🏦 ANA TABLO (11 ÜRÜN İÇİN OPTİMİZE EDİLDİ) */
        .main-terminal { 
            background: #fff; flex: 1; border-radius: 12px; 
            display: flex; flex-direction: column; overflow: hidden; 
            border: 1px solid #e2e8f0;
        }
        .t-head { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 0.8vh 2.5vw; background: #1a1a1a; color: #fff; font-size: 1.7vh; font-weight: 900; text-align: center; }
        .t-head div:first-child { text-align: left; }

        .data-list { flex: 1; display: flex; flex-direction: column; }
        .row { 
            flex: 1; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; 
            padding: 0 2.5vw; border-bottom: 1px solid #eee; 
            align-items: center; text-align: center; transition: background 0.6s ease; 
        }
        .row:nth-child(even) { background: #fafafa; }
        .row.has-gold { background: #ffff00 !important; }

        .n-m { font-size: 2.8vh; font-weight: 900; line-height: 1; text-align: left; } 
        .n-s { font-size: 1vh; color: #666; font-weight: 700; text-transform: uppercase; text-align: left; }
        .price { font-size: 3.5vh; font-weight: 900; font-variant-numeric: tabular-nums; }
        .price.gko { color: var(--gko-red); }

        /* 🕒 FOOTER */
        .footer { 
            height: 7.5vh; background: var(--zer-blue); color: #fff; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 3vw; border-radius: 12px; margin-top: 0.8vh; 
        }
        #clock { font-size: 4.5vh; font-weight: 900; font-family: monospace; }

        /* ANİMASYONLAR */
        .flash-up { animation: flash-green 1s ease-out; }
        .flash-down { animation: flash-red 1s ease-out; }
        @keyframes flash-green { 0% { background-color: rgba(0, 255, 0, 0.3); } 100% { background-color: transparent; } }
        @keyframes flash-red { 0% { background-color: rgba(255, 0, 0, 0.3); } 100% { background-color: transparent; } }
    </style>
</head>
<body>

    <div class="header-logo"><img src="https://doviz.zerjewel.com/l.png"></div>

    <div class="currency-panel">
        <div class="cur-box" id="box-USDTRY"><div class="cur-n">USD/TRY</div><div class="cur-v" id="v-usdtry">--</div></div>
        <div class="cur-box" id="box-EURUSD"><div class="cur-n">EUR/USD</div><div class="cur-v" id="v-eurusd">--</div></div>
        <div class="cur-box" id="box-EURTRY"><div class="cur-n">EUR/TRY</div><div class="cur-v" id="v-eurtry">--</div></div>
    </div>

    <div class="main-terminal">
        <div class="t-head"><div>BİRİM</div><div>ZER ALIŞ</div><div>ZER SATIŞ</div><div style="color: #ffca28;">GKO</div></div>
        <div id="list" class="data-list"></div>
    </div>

    <div class="footer"><div>❖ ZER DÖVİZ | CANLI PİYASA AKIŞI ❖</div><div id="clock">00:00:00</div></div>

    <script>
        const workerURL = "https://harem.nurullahkartal4153012.workers.dev";
        let prev = {}; 

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);

        const splitVal = (id, data) => {
            if(!data[id]) return { a: "--", s: "--" };
            let raw = data[id].Alis;
            if(raw.includes("│")) {
                let p = raw.split("│");
                return { a: p[0].trim(), s: p[1].trim() };
            }
            return { a: data[id].Alis, s: data[id].Satis };
        };

        async function sync() {
            try {
                const res = await fetch(workerURL + "?t=" + Date.now());
                const data = await res.json();
                
                ["USDTRY", "EURUSD", "EURTRY"].forEach(id => {
                    const v = splitVal(id, data);
                    const el = document.getElementById('v-' + id.toLowerCase());
                    if(el) el.innerText = v.a + " | " + v.s;
                });

                // 🏁 ONS LİSTEYE EKLENDİ
                const items = [
                    { id: "HAS", n: "HAS ALTIN", s: "HAS ALTIN (995)" },
                    { id: "GRAM ALTIN", n: "GRAM ALTIN", s: "24 AYAR GRAM" },
                    { id: "BİLEZİK", n: "BİLEZİK / 22 AYAR", s: "İŞÇİLİKSİZ" },
                    { id: "14 AYAR", n: "14 AYAR", s: "14 AYAR" },
                    { id: "TAM", n: "TAM ALTIN", s: "YENİ TAM" },
                    { id: "YARIM", n: "YARIM ALTIN", s: "YENİ YARIM" },
                    { id: "ÇEYREK", n: "ÇEYREK ALTIN", s: "URUP" },
                    { id: "ATA", n: "ATA ALTIN", s: "CUMHURİYET" },
                    { id: "ATA 5Lİ", n: "ATA 5'Lİ", s: "BEŞLİ ALTIN" },
                    { id: "GÜMÜŞ", n: "GÜMÜŞ", s: "GÜMÜŞ (GR)" },
                    { id: "ONS", n: "ONS", s: "ALTIN ONS ($)" }
                ];

                let html = "";
                items.forEach(i => {
                    if(data[i.id]) {
                        const v = splitVal(i.id, data);
                        const gko = data[i.id].GKO || "--";
                        const curr = v.a + v.s + gko;
                        let anim = prev[i.id] && prev[i.id] !== curr ? (curr > prev[i.id] ? "flash-up" : "flash-down") : "";
                        html += `<div class="row ${anim} ${i.id === 'HAS' ? 'has-gold' : ''}">
                            <div class="n-box"><span class="n-m">${i.n}</span><span class="n-s">${i.s}</span></div>
                            <div class="price">${v.a}</div><div class="price">${v.s}</div><div class="price gko">${gko}</div>
                        </div>`;
                        prev[i.id] = curr;
                    }
                });
                document.getElementById('list').innerHTML = html;
            } catch(e) { }
        }
        sync(); setInterval(sync, 4000);
    </script>
</body>
</html>
