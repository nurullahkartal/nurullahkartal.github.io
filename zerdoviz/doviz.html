<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NK DÖVİZ | MASTER TERMİNAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-muted: #64748b;
            --nk-red: #e11d48; --harem-gold: #b45309; --border: rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg: #0e0e0e; --card: #181818; --text: #ffffff; --text-muted: #888888;
            --harem-gold: #c5a059; --border: rgba(255,255,255,0.05);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; 
            padding: 1vh 1vw; transition: background 0.4s ease; 
        }

        /* 👑 TOP BAR */
        .header { height: 12vh; display: flex; justify-content: space-between; align-items: center; padding: 0 1.5vw; margin-bottom: 1vh; }
        .header-left { display: flex; align-items: center; gap: 1.5vw; }
        .header-brand img { height: 9vh; width: auto; transition: 0.3s; }
        [data-theme="dark"] .header-brand img { filter: brightness(10); }
        .brand-text { font-family: 'Space Grotesk', sans-serif; font-weight: 900; letter-spacing: 0.5vw; font-size: 3.5vh; text-transform: uppercase; }

        .header-right { display: flex; align-items: center; gap: 2vw; }
        #digital-clock { font-size: 7.5vh; font-weight: 900; font-family: monospace; letter-spacing: -2px; }
        
        /* 🌓 TEMA SWITCH - */
        .theme-switch-wrapper { display: flex; align-items: center; gap: 10px; }
        .theme-switch { display: inline-block; height: 3vh; position: relative; width: 6vh; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; cursor: pointer; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 0.3vh; content: ""; height: 2.4vh; left: 0.3vh; position: absolute; transition: .4s; width: 2.4vh; border-radius: 50%; }
        input:checked + .slider { background-color: var(--nk-red); }
        input:checked + .slider:before { transform: translateX(3vh); }

        /* 📊 SUMMARY BAR - ÜST ÜSTE DÜZEN */
        .summary-bar { height: 10vh; background: var(--card); border-radius: 12px; display: grid; grid-template-columns: repeat(3, 1fr); margin-bottom: 1vh; border: 1px solid var(--border); }
        .sum-item { display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
        .sum-label { color: var(--harem-gold); font-weight: 900; font-size: 1.6vh; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; }
        .sum-val { font-family: monospace; font-size: 3.2vh; font-weight: 800; display: flex; align-items: center; gap: 10px; line-height: 1; }
        .sum-val span { opacity: 0.3; font-weight: 100; font-size: 2.5vh; color: var(--text-muted); }

        /* 🏦 TABLE */
        .terminal-container { background: var(--card); flex: 1; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .t-head { display: grid; grid-template-columns: 2fr 1.2fr 1.2fr 1fr; height: 6vh; padding: 0 3vw; align-items: center; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 1.4vh; font-weight: 900; text-align: center; }
        .t-head div:first-child { text-align: left; }

        .data-list { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .row { flex: 1; display: grid; grid-template-columns: 2fr 1.2fr 1.2fr 1fr; padding: 0 3vw; border-bottom: 1px solid var(--border); align-items: center; text-align: center; }
        .n-box { text-align: left; line-height: 1.1; }
        .n-m { font-size: 2.6vh; font-weight: 900; text-transform: uppercase; } 
        .n-s { font-size: 1.1vh; color: var(--text-muted); font-weight: 800; }
        .price { font-size: 4vh; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -1.5px; }
        .price.gko { color: var(--nk-red); }

        /* 🕒 FOOTER */
        .footer { height: 5vh; display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--border); }
        .footer-info { font-family: 'Space Grotesk', sans-serif; font-size: 2vh; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
        .footer-info span { font-size: 1vh; color: var(--nk-red); font-style: italic; margin-left: 10px; font-weight: 400; }

        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            .header, .summary-bar, .footer { height: auto; padding: 15px; }
            #digital-clock { font-size: 35px; }
            .summary-bar { grid-template-columns: 1fr; height: auto; }
            .sum-item { border-right: none; border-bottom: 1px solid var(--border); padding: 10px; }
            .terminal-container { height: auto; min-height: 800px; }
            .price { font-size: 20px; }
        }

        .up { color: #22c55e !important; } .down { color: #ef4444 !important; }
    </style>
</head>
<body data-theme="light">

    <header class="header">
        <div class="header-left">
            <div class="header-brand"><img src="nklogo.png" alt="NK"></div>
            <span class="brand-text">NK DÖVİZ</span>
        </div>
        <div class="header-right">
            <div id="digital-clock">00:00:00</div>
            <div class="theme-switch-wrapper">
                <i class="fas fa-sun"></i>
                <label class="theme-switch">
                    <input type="checkbox" id="checkbox" onchange="toggleTheme()">
                    <div class="slider"></div>
                </label>
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </header>

    <div class="summary-bar">
        <div class="sum-item">
            <span class="sum-label">USD / TRY</span>
            <span class="sum-val" id="v-usdtry">-- <span>|</span> --</span>
        </div>
        <div class="sum-item">
            <span class="sum-label">EUR / TRY</span>
            <span class="sum-val" id="v-eurtry">-- <span>|</span> --</span>
        </div>
        <div class="sum-item" style="border:none;">
            <span class="sum-label">EUR / USD</span>
            <span class="sum-val" id="v-eurusd">-- <span>|</span> --</span>
        </div>
    </div>

    <div class="terminal-container">
        <div class="t-head"><div>VARLIK BİRİMİ</div><div>ALIŞ</div><div>SATIŞ</div><div>GKO</div></div>
        <div id="list" class="data-list"></div>
    </div>

    <footer class="footer">
        <div class="footer-info">NK DÖVİZ <span>BY NKartal</span></div>
    </footer>

    <script>
        const API = "https://harem.nurullahkartal4153012.workers.dev";
        let prev = {}; 

        setInterval(() => { document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString('tr-TR'); }, 1000);

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', target);
            localStorage.setItem('nk-theme', target);
        }
        // Aydınlık Mod Başlangıcı
        const saved = localStorage.getItem('nk-theme') || 'light';
        document.body.setAttribute('data-theme', saved);
        document.getElementById('checkbox').checked = saved === 'dark';

        const parse = (id, data) => {
            const entry = data[id]; if(!entry) return { a: "--", s: "--", gko: "--" };
            let alis = entry.Alis || "--", satis = entry.Satis || "--";
            
            // 🛡️ AKILLI BÖLME MOTORU: │ veya | karakterlerini temizler
            if(typeof alis === 'string' && (alis.includes("│") || alis.includes("|"))) {
                let p = alis.split(/[│|]/);
                alis = p[0].trim(); satis = p[1].trim();
            }
            return { a: alis, s: satis, gko: entry.GKO || "--" };
        };

        async function sync() {
            try {
                const res = await fetch(API + "?t=" + Date.now());
                const data = await res.json();
                
                // 📊 ÜST PANELLER: ALIŞ | SATIŞ
                const usd = parse("USDTRY", data);
                const eurt = parse("EURTRY", data);
                const euru = parse("EURUSD", data);

                document.getElementById('v-usdtry').innerHTML = `${usd.a} <span>|</span> ${usd.s}`;
                document.getElementById('v-eurtry').innerHTML = `${eurt.a} <span>|</span> ${eurt.s}`;
                document.getElementById('v-eurusd').innerHTML = `${euru.a} <span>|</span> ${euru.s}`;

                const items = [
                    { id: "HAS", n: "HAS ALTIN", s: "HAREM (995)" },
                    { id: "GRAM ALTIN", n: "GRAM ALTIN", s: "24 AYAR" },
                    { id: "BİLEZİK", n: "22 AYAR", s: "İŞÇİLİKSİZ" },
                    { id: "14 AYAR", n: "14 AYAR", s: "TAKI" },
                    { id: "ÇEYREK", n: "ÇEYREK ALTIN", s: "YENİ BASKI" },
                    { id: "YARIM", n: "YARIM ALTIN", s: "YENİ BASKI" },
                    { id: "TAM", n: "TAM ALTIN", s: "YENİ BASKI" },
                    { id: "ATA", n: "ATA ALTIN", s: "TAM" },
                    { id: "ATA 5Lİ", n: "ATA 5'Lİ", s: "REŞAT / BEŞLİ" },
                    { id: "GÜMÜŞ", n: "GÜMÜŞ", s: "HAS (GR)" },
                    { id: "ONS", n: "ONS ALTIN", s: "GLOBAL ($)" }
                ];

                let html = "";
                items.forEach(i => {
                    const p = parse(i.id, data);
                    let animA = prev[i.id + 'a'] && prev[i.id + 'a'] !== p.a ? (p.a > prev[i.id + 'a'] ? "up" : "down") : "";
                    let animS = prev[i.id + 's'] && prev[i.id + 's'] !== p.s ? (p.s > prev[i.id + 's'] ? "up" : "down") : "";
                    html += `<div class="row">
                        <div class="n-box"><span class="n-m">${i.n}</span><br><span class="n-s">${i.s}</span></div>
                        <div class="price ${animA}">${p.a}</div><div class="price ${animS}">${p.s}</div><div class="price gko">${p.gko}</div>
                    </div>`;
                    prev[i.id + 'a'] = p.a; prev[i.id + 's'] = p.s;
                });
                document.getElementById('list').innerHTML = html;
            } catch(e) { }
        }
        sync(); setInterval(sync, 4000);
    </script>
</body>
</html>
