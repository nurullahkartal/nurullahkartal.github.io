<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NK | DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --nk-red: #e11d48; --border: rgba(0,0,0,0.05); }
        [data-theme="dark"] { --bg: #0e0e0e; --card: #181818; --text: #ffffff; --border: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; padding: 2vh; }
        .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .dash-card { background: var(--card); border-radius: 20px; padding: 2rem; border: 1px solid var(--border); }
        .stat { font-size: 3rem; font-weight: 900; color: var(--nk-red); }
        .theme-switch { display: inline-block; height: 3vh; position: relative; width: 6vh; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; cursor: pointer; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 0.3vh; content: ""; height: 2.4vh; left: 0.3vh; position: absolute; transition: .4s; width: 2.4vh; border-radius: 50%; }
        input:checked + .slider { background-color: var(--nk-red); }
        input:checked + .slider:before { transform: translateX(3vh); }
    </style>
</head>
<body data-theme="light">
    <div style="display:flex; justify-content:space-between; margin-bottom:4vh;">
        <img src="nklogo.png" style="height:6vh;">
        <div style="display:flex; align-items:center; gap:15px;"><i class="fas fa-sun"></i><label class="theme-switch"><input type="checkbox" id="checkbox" onchange="toggleTheme()"><div class="slider"></div></label><i class="fas fa-moon"></i></div>
    </div>
    <div class="dash-grid">
        <div class="dash-card"><h4>LMTNASY Durum</h4><div class="stat">AKTİF</div></div>
        <div class="dash-card"><h4>AI Operasyon</h4><div class="stat">V2.0</div></div>
        <div class="dash-card"><h4>Vizyon Yılı</h4><div class="stat">2031</div></div>
    </div>
    <script>
        function toggleTheme() { const target = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', target); localStorage.setItem('nk-theme', target); }
        const saved = localStorage.getItem('nk-theme') || 'light'; document.body.setAttribute('data-theme', saved); document.getElementById('checkbox').checked = saved === 'dark';
    </script>
</body>
</html>
