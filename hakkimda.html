<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakkımda | NURULLAH KARTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-muted: #64748b; --nk-red: #e11d48; --border: rgba(0,0,0,0.05); }
        [data-theme="dark"] { --bg: #0e0e0e; --card: #181818; --text: #ffffff; --text-muted: #888888; --border: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; transition: 0.4s; }
        .header { height: 12vh; display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; border-bottom: 1px solid var(--border); background: var(--card); }
        .header-brand img { height: 8vh; width: auto; transition: 0.3s; }
        [data-theme="dark"] .header-brand img { filter: brightness(10); }
        .main-card { max-width: 900px; margin: 5vh auto; background: var(--card); border-radius: 25px; padding: 3rem; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.05); }
        .vizyon-box { border-left: 6px solid var(--nk-red); padding: 1.5rem; background: var(--bg); border-radius: 15px; margin-top: 2rem; }
        h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; italic: true; }
        h1 span { color: var(--nk-red); }
        .nav-links { margin-top: 3rem; display: flex; gap: 20px; justify-content: center; }
        .nav-link { color: var(--nk-red); text-decoration: none; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; }
        .theme-switch { display: inline-block; height: 3vh; position: relative; width: 6vh; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; cursor: pointer; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 0.3vh; content: ""; height: 2.4vh; left: 0.3vh; position: absolute; transition: .4s; width: 2.4vh; border-radius: 50%; }
        input:checked + .slider { background-color: var(--nk-red); }
        input:checked + .slider:before { transform: translateX(3vh); }
    </style>
</head>
<body data-theme="light">
    <header class="header">
        <a href="index.html" class="header-brand"><img src="nklogo.png" alt="NK"></a>
        <div style="display:flex; align-items:center; gap:15px;"><i class="fas fa-sun"></i><label class="theme-switch"><input type="checkbox" id="checkbox" onchange="toggleTheme()"><div class="slider"></div></label><i class="fas fa-moon"></i></div>
    </header>
    <main class="main-card">
        <h1>NURULLAH <span>KARTAL</span></h1>
        <p style="font-size:1.2rem; line-height:1.6; opacity:0.8;">Muhasebe ve Lojistik alanında 4 yıllık deneyime sahip, operasyonlarını yapay zeka ve otomasyonla mühürleyen bir profesyonelim.</p>
        <div class="vizyon-box">
            <h4 style="font-size:0.7rem; font-weight:900; opacity:0.4; text-transform:uppercase; margin-bottom:0.5rem;">2031 Vizyonu</h4>
            <p style="font-weight:700; font-style:italic;">"Büyük holding yapılarında dijital dönüşümü saniye sektirmeden yönetmek."</p>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Terminal</a>
            <a href="projeler.html" class="nav-link">Projeler</a>
            <a href="iletisim.html" class="nav-link">İletişim</a>
        </div>
    </main>
    <script>
        function toggleTheme() { const target = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', target); localStorage.setItem('nk-theme', target); }
        const saved = localStorage.getItem('nk-theme') || 'light'; document.body.setAttribute('data-theme', saved); document.getElementById('checkbox').checked = saved === 'dark';
    </script>
</body>
</html>
