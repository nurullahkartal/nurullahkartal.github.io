<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hakkımda | NURULLAH KARTAL</title>
    <link rel="icon" type="image/png" href="nklogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{nkPlatinum:'#f1f5f9',nkAnthracite:'#1e293b',nkPower:'#7f1d1d'}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif; cursor:none;} .brand-logo{height:100px; transition:0.3s;} .cursor-dot{width:6px;height:6px;background:#7f1d1d;position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}</style>
</head>
<body class="bg-nkPlatinum text-nkAnthracite min-h-screen pt-40 px-6">
    <div class="cursor-dot"></div>
    <nav class="fixed top-0 w-full z-50 py-10 px-12 flex justify-between items-center backdrop-blur-sm">
        <div class="flex items-center gap-8">
            <img src="nklogo.png" alt="NK" class="brand-logo">
            <span class="text-xl font-black tracking-[0.5em] uppercase text-nkPower">NK DIGITAL</span>
        </div>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest opacity-50 hover:opacity-100 transition">← Karargah</a>
    </nav>
    <main class="max-w-4xl mx-auto bg-white p-16 rounded-[4rem] shadow-2xl border-t-8 border-nkPower">
        <h1 class="text-6xl font-black uppercase mb-10 italic">NURULLAH <span class="text-nkPower">KARTAL</span></h1>
        <p class="text-lg opacity-80 leading-relaxed mb-10">Gaziantep sanayisinin dinamizmini dijital mühürle buluşturan, 2031 holding vizyonuna sahip operasyon şefi.</p>
        <div class="grid grid-cols-2 gap-8">
            <div class="p-8 bg-nkPlatinum rounded-3xl border-l-8 border-nkAnthracite">
                <h4 class="text-[10px] font-black uppercase opacity-40 mb-2">HEDEF 2031</h4>
                <p class="font-bold italic text-sm">"Operasyonel dijital dönüşümün zirvesinde yer almak."</p>
            </div>
        </div>
    </main>
    <script>const dot=document.querySelector('.cursor-dot'); window.addEventListener('mousemove',(e)=>{dot.style.left=e.clientX+'px'; dot.style.top=e.clientY+'px';});</script>
</body>
</html>
