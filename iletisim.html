    <script src="https://platform.linkedin.com/badges/js/profile.js" async defer type="text/javascript"></script>
    <style>
        :root { --ig-grad: linear-gradient(45deg, #f09433 0%, #bc1888 100%); }
        @media (prefers-color-scheme: dark) { body { background: #050505; color: #eee; } .glass-card { background: rgba(255,255,255,0.03); } }
        @media (prefers-color-scheme: light) { body { background: #fff; color: #222; } .glass-card { background: #fafafa; } }
        .insta-text { background: var(--ig-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="antialiased pb-20">
    <nav class="fixed top-0 w-full z-50 py-4 px-6 flex justify-between items-center backdrop-blur-md border-b border-black/5">
        <a href="index.html" class="tech-font text-xl font-bold insta-text">NK.</a>
        <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest opacity-50">← Menü</a>

    <main class="max-w-4xl mx-auto pt-32 px-6">

        <div class="grid gap-8">
            <a href="mailto:nurullahkartaltr@gmail.com" class="glass-card p-8 rounded-3xl border border-black/5 flex items-center justify-between hover:scale-[1.01] transition-all">

            </a>

                    <a class="badge-base__link LI-simple-link" href="https://tr.linkedin.com/in/nurullahkartal?trk=profile-badge">NURULLAH KARTAL</a>
