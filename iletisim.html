<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | NURULLAH KARTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --nk-red: #e11d48; --border: rgba(0,0,0,0.05); }
        [data-theme="dark"] { --bg: #0e0e0e; --card: #181818; --text: #ffffff; --border: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; }
        .header { height: 12vh; display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; background: var(--card); border-bottom: 1px solid var(--border); }
        .header-brand img { height: 8vh; width: auto; }
        [data-theme="dark"] .header-brand img { filter: brightness(10); }
        .card { max-width: 600px; margin: 10vh auto; background: var(--card); border-radius: 25px; padding: 3rem; text-align: center; border: 1px solid var(--border); }
        .btn { display: block; padding: 1.2rem; background: var(--bg); border-radius: 15px; text-decoration: none; color: var(--text); font-weight: 900; margin-bottom: 1rem; border: 1px solid var(--border); transition: 0.3s; }
        .btn:hover { border-color: var(--nk-red); color: var(--nk-red); }
        .theme-switch { display: inline-block; height: 3vh; position: relative; width: 6vh; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; cursor: pointer; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 0.3vh; content: ""; height: 2.4vh; left: 0.3vh; position: absolute; transition: .4s; width: 2.4vh; border-radius: 50%; }
        input:checked + .slider { background-color: var(--nk-red); }
        input:checked + .slider:before { transform: translateX(3vh); }
    </style>
</head>
<body data-theme="light">
    <header class="header">
        <a href="index.html" class="header-brand"><img src="nklogo.png" alt="NK"></a>
        <div style="display:flex; align-items:center; gap:15px;"><i class="fas fa-sun"></i><label class="theme-switch"><input type="checkbox" id="checkbox" onchange="toggleTheme()"><div class="slider"></div></label><i class="fas fa-moon"></i></div>
    </header>
    <div class="card">
        <h2 style="font-weight:900; margin-bottom:2rem; font-size:2rem;">İRTİBAT <span style="color:var(--nk-red);">HATTI</span></h2>
        <a href="nurullah_kartal_cv.pdf" download class="btn"><i class="fas fa-file-pdf"></i> ÖZGEÇMİŞ İNDİR (PDF)</a>
        <a href="mailto:nurullahkartaltr@gmail.com" class="btn"><i class="fas fa-envelope"></i> nurullahkartaltr@gmail.com</a>
    </div>
    <script>
        function toggleTheme() { const target = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', target); localStorage.setItem('nk-theme', target); }
        const saved = localStorage.getItem('nk-theme') || 'light'; document.body.setAttribute('data-theme', saved); document.getElementById('checkbox').checked = saved === 'dark';
    </script>
</body>
</html>
