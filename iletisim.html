<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | NURULLAH KARTAL</title>
    <link rel="icon" type="image/png" href="nklogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { mayaBeige: '#f4ece6', mayaBlue: '#0052ff', mayaDark: '#1a1a1a' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.5s ease; cursor: none; }
        .main-card { background: #ffffff; border-radius: 2.5rem; }
        .dark body { background-color: #0f1115; color: #fff; }
        .dark .main-card { background-color: #16181d; }
        .pill-btn { border-radius: 9999px; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
        .cursor-dot { width: 6px; height: 6px; background: #0052ff; position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        .cursor-outline { width: 35px; height: 35px; border: 1.5px solid rgba(0, 82, 255, 0.2); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: all 0.15s ease; }
        .brand-logo { height: 65px; }
    </style>
</head>
<body class="antialiased bg-mayaBeige text-mayaDark min-h-screen">
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <nav class="fixed top-0 w-full z-50 py-10 px-8 md:px-16 flex justify-between items-center backdrop-blur-sm">
        <a href="index.html" class="flex items-center gap-4">
            <img src="nklogo.png" alt="NK" class="brand-logo dark:invert dark:brightness-200">
            <span class="text-lg font-black tracking-[0.4em] uppercase hidden sm:block">NK DIGITAL</span>
        </a>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest opacity-50 hover:opacity-100 transition">← Karargah</a>
    </nav>

    <main class="pt-48 pb-20 px-6 flex flex-col items-center">
        <div class="max-w-5xl w-full">
            <div class="main-card p-10 md:p-16 mb-10 shadow-2xl shadow-black/5 text-center">
                <div class="w-20 h-1.5 bg-mayaBlue mx-auto mb-10 rounded-full"></div>
                <h1 class="text-4xl md:text-6xl font-black uppercase mb-12 tracking-tighter italic">İRTİBAT <span class="text-mayaBlue">Hattı</span></h1>
                
                <div class="grid md:grid-cols-2 gap-8 mb-12">
                    <a href="nurullah_kartal_cv.pdf" download class="p-8 bg-gray-50 dark:bg-white/5 rounded-3xl flex flex-col items-center group transition border border-transparent hover:border-mayaBlue">
                        <i class="fas fa-file-pdf text-3xl text-mayaBlue mb-4 group-hover:scale-110 transition"></i>
                        <span class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-1">Özgeçmiş</span>
                        <span class="text-xs font-black">CV İNDİR (PDF)</span>
                    </a>
                    <a href="mailto:nurullahkartaltr@gmail.com" class="p-8 bg-gray-50 dark:bg-white/5 rounded-3xl flex flex-col items-center group transition border border-transparent hover:border-mayaBlue">
                        <i class="fas fa-envelope-open-text text-3xl text-mayaBlue mb-4 group-hover:scale-110 transition"></i>
                        <span class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-1">Resmi Yazışma</span>
                        <span class="text-xs font-black">nurullahkartaltr@gmail.com</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
            outline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 300, fill: "forwards" });
        });
    </script>
</body>
</html>
