<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | NURULLAH KARTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-muted: #64748b; --nk-red: #e11d48; --border: rgba(0,0,0,0.05); }
        [data-theme="dark"] { --bg: #0e0e0e; --card: #181818; --text: #ffffff; --text-muted: #888888; --border: rgba(255,255,255,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; }
        .header { height: 12vh; display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; border-bottom: 1px solid var(--border); background: var(--card); }
        .header-brand img { height: 8vh; width: auto; transition: 0.3s; }
        [data-theme="dark"] .header-brand img { filter: brightness(10); }
        .container { max-width: 1000px; margin: 5vh auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .project-card { background: var(--card); border-radius: 20px; padding: 2.5rem; border: 1px solid var(--border); transition: 0.3s; }
        .project-card:hover { border-color: var(--nk-red); transform: translateY(-5px); }
        .tag { font-size: 0.6rem; font-weight: 900; background: var(--bg); padding: 5px 12px; border-radius: 50px; text-transform: uppercase; color: var(--nk-red); }
        .theme-switch { display: inline-block; height: 3vh; position: relative; width: 6vh; }
        .theme-switch input { display: none; }
        .slider { background-color: #ccc; cursor: pointer; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px; }
        .slider:before { background-color: white; bottom: 0.3vh; content: ""; height: 2.4vh; left: 0.3vh; position: absolute; transition: .4s; width: 2.4vh; border-radius: 50%; }
        input:checked + .slider { background-color: var(--nk-red); }
        input:checked + .slider:before { transform: translateX(3vh); }
    </style>
</head>
<body data-theme="light">
    <header class="header">
        <a href="index.html" class="header-brand"><img src="nklogo.png" alt="NK"></a>
        <div style="display:flex; align-items:center; gap:15px;"><i class="fas fa-sun"></i><label class="theme-switch"><input type="checkbox" id="checkbox" onchange="toggleTheme()"><div class="slider"></div></label><i class="fas fa-moon"></i></div>
    </header>
    <div class="container">
        <h2 style="font-size:2.5rem; font-weight:900; margin-bottom:3rem; text-transform:uppercase; letter-spacing:-1px;">Teknoloji <span style="color:var(--nk-red);">Envanteri</span></h2>
        <div class="grid">
            <div class="project-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;"><i class="fab fa-python" style="font-size:2rem; color:var(--nk-red);"></i><span class="tag">E-Ticaret</span></div>
                <h3 style="font-weight:900; margin-bottom:1rem;">LMTNASY</h3>
                <p style="font-size:0.9rem; opacity:0.7; line-height:1.5;">Suriye pazarı için geliştirilen, Python tabanlı ilan ve seri satış platformu.</p>
            </div>
            <div class="project-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:1.5rem;"><i class="fas fa-robot" style="font-size:2rem; color:var(--nk-red);"></i><span class="tag">AI Bot</span></div>
                <h3 style="font-weight:900; margin-bottom:1rem;">NK-OPERATIONAL AI</h3>
                <p style="font-size:0.9rem; opacity:0.7; line-height:1.5;">Muhasebe ve lojistik raporlamalarını saniye sektirmeden otomatize eden özel AI scriptleri.</p>
            </div>
        </div>
    </div>
    <script>
        function toggleTheme() { const target = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', target); localStorage.setItem('nk-theme', target); }
        const saved = localStorage.getItem('nk-theme') || 'light'; document.body.setAttribute('data-theme', saved); document.getElementById('checkbox').checked = saved === 'dark';
    </script>
</body>
</html>
