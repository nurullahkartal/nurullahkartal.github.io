<!DOCTYPE html><html lang="tr"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>NURULLAH KARTAL | RESMİ WEB SİTESİ</title>    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    <style>        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --nk-red: #e11d48; --border: rgba(0,0,0,0.05); }        [data-theme="dark"] { --bg: #0e0e0e; --card: #181818; --text: #ffffff; --border: rgba(255,255,255,0.05); }        * { box-sizing: border-box; margin: 0; padding: 0; }        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; transition: 0.4s; overflow: hidden; }        .header { height: 12vh; display: flex; justify-content: space-between; align-items: center; padding: 0 4vw; background: var(--card); border-bottom: 1px solid var(--border); }        .header-brand img { height: 8vh; width: auto; transition: 0.3s; }        [data-theme="dark"] .header-brand img { filter: brightness(10); }        .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }        .hero h1 { font-size: 5rem; font-weight: 900; letter-spacing: -3px; line-height: 0.9; text-transform: uppercase; }        .hero h1 span { color: var(--nk-red); }        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 800px; width: 100%; margin-top: 5vh; }        .nav-card { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid var(--border); text-decoration: none; color: var(--text); font-weight: 900; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; }        .nav-card:hover { border-color: var(--nk-red); transform: translateY(-5px); }        .theme-switch { display: inline-block; height: 3vh; position: relative; width: 6vh; }        .theme-switch input { display: none; }        .slider { background-color: #ccc; cursor: pointer; position: absolute; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 34px; }        .slider:before { background-color: white; bottom: 0.3vh; content: ""; height: 2.4vh; left: 0.3vh; position: absolute; transition: .4s; width: 2.4vh; border-radius: 50%; }        input:checked + .slider { background-color: var(--nk-red); }        input:checked + .slider:before { transform: translateX(3vh); }    </style></head><body data-theme="light">    <header class="header">        <div class="header-brand"><img src="nklogo.png" alt="NK"></div>        <div style="display:flex; align-items:center; gap:15px;"><i class="fas fa-sun"></i><label class="theme-switch"><input type="checkbox" id="checkbox" onchange="toggleTheme()"><div class="slider"></div></label><i class="fas fa-moon"></i></div>    </header>    <main class="hero">        <h1>NURULLAH<br><span>KARTAL</span></h1>        <div class="nav-grid">            <a href="doviz/index.html" class="nav-card">Terminal</a>            <a href="hakkimda.html" class="nav-card">Profil</a>            <a href="projeler.html" class="nav-card">Projeler</a>            <a href="iletisim.html" class="nav-card">İletişim</a>        </div>    </main>    <script>        function toggleTheme() { const target = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', target); localStorage.setItem('nk-theme', target); }        const saved = localStorage.getItem('nk-theme') || 'light'; document.body.setAttribute('data-theme', saved); document.getElementById('checkbox').checked = saved === 'dark';    </script></body></html>
