<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gizlilik | NK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --nk-red: #e11d48; }
        [data-theme="dark"] { --bg: #0e0e0e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 10vh 10vw; line-height: 1.6; transition: 0.4s; }
        h1 { font-weight: 900; color: var(--nk-red); margin-bottom: 2rem; }
    </style>
</head>
<body data-theme="light">
    <h1>GİZLİLİK POLİTİKASI</h1>
    <p>Bu platform, Nurullah Kartal operasyonlarının dijital mühürüdür. Veriler saniye sektirmeden korunur.</p>
    <script>const saved = localStorage.getItem('nk-theme') || 'light'; document.body.setAttribute('data-theme', saved);</script>
</body>
</html>
