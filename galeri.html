<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri | NURULLAH KARTAL</title>
    <link rel="icon" type="image/png" href="nklogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { mayaBeige: '#f4ece6', mayaBlue: '#0052ff', mayaDark: '#1a1a1a' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.5s ease; cursor: none; }
        .main-card { background: #ffffff; border-radius: 2rem; overflow: hidden; }
        .dark body { background-color: #0f1115; }
        .dark .main-card { background-color: #16181d; }
        img { filter: grayscale(100%); transition: 0.6s ease; }
        img:hover { filter: grayscale(0%); transform: scale(1.03); }
        .cursor-dot { width: 6px; height: 6px; background: #0052ff; position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        .cursor-outline { width: 35px; height: 35px; border: 1.5px solid rgba(0, 82, 255, 0.2); position: fixed; border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: all 0.15s ease; }
        .brand-logo { height: 65px; }
    </style>
</head>
<body class="antialiased bg-mayaBeige text-mayaDark min-h-screen">
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <nav class="fixed top-0 w-full z-50 py-10 px-8 md:px-16 flex justify-between items-center backdrop-blur-sm">
        <a href="index.html" class="flex items-center gap-4">
            <img src="nklogo.png" alt="NK" class="brand-logo dark:invert dark:brightness-200">
            <span class="text-lg font-black tracking-[0.4em] uppercase">NK DIGITAL</span>
        </a>
        <a href="index.html" class="text-[10px] font-black uppercase tracking-widest opacity-50 hover:opacity-100 transition">← Karargah</a>
    </nav>

    <main class="pt-48 pb-20 px-6 flex flex-col items-center">
        <div class="max-w-6xl w-full text-center">
            <div class="w-16 h-1 bg-mayaBlue mx-auto mb-8 rounded-full"></div>
            <h1 class="text-5xl md:text-7xl font-black uppercase mb-16 tracking-tighter italic">GÖRSEL <span class="text-mayaBlue">ARŞİV</span></h1>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                <div class="main-card shadow-xl shadow-black/5">
                    <img src="img/nurullah-kartal-profil.jpeg" alt="Nurullah Kartal" class="w-full h-80 object-cover" onerror="this.src='https://via.placeholder.com/600x800/111/fff?text=Profil'">
                    <div class="p-6"><span class="text-[8px] font-black uppercase tracking-widest opacity-40">Kurumsal Portre</span></div>
                </div>
                <div class="main-card shadow-xl shadow-black/5">
                    <img src="img/nurullah-kartal-gdg.jpeg" alt="GDG" class="w-full h-80 object-cover" onerror="this.src='https://via.placeholder.com/600x800/111/fff?text=GDG+Gaziantep'">
                    <div class="p-6"><span class="text-[8px] font-black uppercase tracking-widest opacity-40">Etkinlik Kaydı</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
            outline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 300, fill: "forwards" });
        });
    </script>
</body>
</html>
