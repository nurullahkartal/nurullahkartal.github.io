<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gönderiler | NURULLAH KARTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --ig-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
        
        @media (prefers-color-scheme: dark) {
            body { background-color: #050505; color: #f8fafc; }
            .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        }
        @media (prefers-color-scheme: light) {
            body { background-color: #f8fafc; color: #0f172a; }
            .glass-card { background: rgba(0, 0, 0, 0.02); border: 1px solid rgba(0, 0, 0, 0.05); }
        }
        .insta-text { background: var(--ig-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .insta-bg { background: var(--ig-grad); }
        iframe { border-radius: 12px; }
    </style>
</head>
<body class="antialiased pb-20">
    <nav class="fixed top-0 w-full z-50 py-4 px-6 md:px-10 flex justify-between items-center backdrop-blur-md border-b border-white/5">
        <a href="index.html" class="tech-font text-xl md:text-2xl font-bold insta-text tracking-tighter">NK.</a>
        <div class="flex space-x-4 md:space-x-8 text-[10px] uppercase tracking-widest font-bold opacity-60">
            <a href="index.html" class="hover:opacity-100 transition">Ana Sayfa</a>
            <a href="hakkimda.html" class="hover:opacity-100 transition">Hakkımda</a>
            <a href="iletisim.html" class="hover:opacity-100 transition">İletişim</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-32 px-6">
        <h1 class="tech-font text-4xl md:text-6xl font-black uppercase italic mb-12 tracking-tighter text-center">
            SOSYAL <span class="insta-text">AKIS</span>
        </h1>
        
        <div class="grid md:grid-cols-2 gap-8 items-start">
            <div class="glass-card p-6 md:p-8 rounded-[2.5rem] flex flex-col items-center overflow-hidden">
                <h3 class="tech-font font-bold uppercase text-[10px] mb-6 opacity-40 tracking-[0.4em]">LinkedIn / DevFest 2025</h3>
                <div class="w-full flex justify-center h-[550px]">
                    <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:share:7387895373123702784" height="100%" width="100%" frameborder="0" allowfullscreen="" title="LinkedIn Post"></iframe>
                </div>
            </div>

            <div class="glass-card p-6 md:p-8 rounded-[2.5rem] flex flex-col items-center h-full min-h-[400px] justify-center text-center">
                <h3 class="tech-font font-bold uppercase text-[10px] mb-8 opacity-40 tracking-[0.4em]">Instagram / Güncel Paylaşımlar</h3>
                
                <div class="w-24 h-24 rounded-full p-1 mb-6 insta-bg">
                    <div class="w-full h-full rounded-full bg-[#050505] flex items-center justify-center">
                        <i class="fab fa-instagram text-4xl insta-text"></i>
                    </div>
                </div>

                <p class="italic font-light text-sm opacity-70 mb-8 max-w-xs leading-relaxed">
                    Instagram üzerindeki tüm yeni projelerimi, etkinlik paylaşımlarımı ve güncel hikayelerimi takip etmek için profile göz atın.
                </p>

                <a href="https://www.instagram.com/nurullahkrtal/" target="_blank" class="insta-bg px-8 py-3 rounded-full text-white text-xs font-black uppercase tracking-widest hover:scale-105 transition-all shadow-xl shadow-pink-500/20">
                    PROFİLİ ZİYARET ET
                </a>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-10 text-center opacity-20 text-[8px] uppercase tracking-[0.5em]">
        © 2026 NURULLAH KARTAL
    </footer>
</body>
</html>
