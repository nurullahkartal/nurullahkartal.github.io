<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gönderiler | NURULLAH KARTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    
    <script src="https://platform.linkedin.com/badges/js/profile.js" async defer type="text/javascript"></script>

    <style>
        :root { --ig-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        @media (prefers-color-scheme: dark) { 
            body { background: #050505; color: #eee; } 
            .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.1); } 
        }
        @media (prefers-color-scheme: light) { 
            body { background: #fff; color: #222; } 
            .glass-card { background: #fafafa; border: 1px solid rgba(0,0,0,0.05); } 
        }
        .insta-text { background: var(--ig-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tech-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="antialiased pb-20">
    <nav class="fixed top-0 w-full z-50 py-4 px-6 flex justify-between items-center backdrop-blur-md border-b border-black/5">
        <a href="index.html" class="tech-font text-xl font-bold insta-text text-decoration-none">NK.</a>
        <div class="flex space-x-4 text-[10px] font-bold uppercase tracking-widest opacity-50">
            <a href="index.html" class="hover:opacity-100 transition">Ana Sayfa</a>
            <a href="iletisim.html" class="hover:opacity-100 transition">İletişim</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto pt-32 px-6">
        <h1 class="tech-font text-4xl md:text-6xl font-black uppercase italic mb-12 tracking-tighter text-center italic">
            SOSYAL <span class="insta-text">AKIS</span>
        </h1>
        
        <div class="grid md:grid-cols-2 gap-8 items-start mb-12">
            <div class="glass-card p-6 rounded-3xl flex flex-col items-center">
                <h3 class="tech-font font-bold uppercase text-[10px] mb-8 opacity-40 tracking-[0.3em]">LinkedIn Profil</h3>
                <div class="badge-base LI-profile-badge" data-locale="tr_TR" data-size="large" data-theme="dark" data-type="HORIZONTAL" data-vanity="nurullahkartal" data-version="v1">
                    <a class="badge-base__link LI-simple-link" href="https://tr.linkedin.com/in/nurullahkartal?trk=profile-badge">NURULLAH KARTAL</a>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl flex flex-col items-center overflow-hidden">
                <h3 class="tech-font font-bold uppercase text-[10px] mb-8 opacity-40 tracking-[0.3em]">LinkedIn DevFest 2025</h3>
                <div class="w-full flex justify-center">
                    <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:activity:7387895373123702784" height="600" width="100%" frameborder="0" allowfullscreen="" title="Gömülü Gönderi"></iframe>
                </div>
            </div>
        </div>

        <div class="max-w-2xl mx-auto">
            <div class="glass-card p-6 rounded-3xl flex flex-col items-center">
                <h3 class="tech-font font-bold uppercase text-[10px] mb-8 opacity-40 tracking-[0.3em]">Instagram Paylaşımı</h3>
                <div class="w-full flex justify-center overflow-hidden rounded-xl">
                    <blockquote class="instagram-media" data-instgrm-captioned data-instgrm-permalink="https://www.instagram.com/p/DQSjodBjNpA/?utm_source=ig_embed&amp;utm_campaign=loading" data-instgrm-version="14" style=" background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin: 1px; max-width:540px; min-width:326px; padding:0; width:99.375%; width:-webkit-calc(100% - 2px); width:calc(100% - 2px);">
                        <div style="padding:16px;"> <a href="https://www.instagram.com/p/DQSjodBjNpA/?utm_source=ig_embed&amp;utm_campaign=loading" style=" background:#FFFFFF; line-height:0; padding:0 0; text-align:center; text-decoration:none; width:100%;" target="_blank">Paylaşımı Gör</a></div>
                    </blockquote>
                    <script async src="//www.instagram.com/embed.js"></script>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-10 text-center opacity-20 text-[8px] uppercase tracking-[0.5em]">
        © 2026 NURULLAH KARTAL
    </footer>
</body>
</html>
